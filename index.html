<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 坦克大战 - Tank Battle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 900px;
            padding: 0 10px;
        }
        .game-title {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #e94560, #f0c040);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }
        .score-panel { display: flex; gap: 24px; align-items: center; }
        .player-score { display: flex; flex-direction: column; align-items: center; gap: 1px; }
        .player-score .name { font-size: 0.8rem; font-weight: 700; letter-spacing: 1px; }
        .player-score .score { font-size: 1.6rem; font-weight: 900; transition: transform 0.15s; }
        .p1-color { color: #4da6ff; }
        .p2-color { color: #ff4d4d; }
        .vs-divider { font-size: 1.1rem; font-weight: 900; color: #555; }
        canvas {
            border: 3px solid #2a2a4a;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(233,69,96,0.15), 0 0 80px rgba(233,69,96,0.05), 0 8px 32px rgba(0,0,0,0.5);
            background: #0f0f1a;
            cursor: crosshair;
            max-width: 100%;
            height: auto;
        }
        .controls-info { display: flex; gap: 40px; color: #888; font-size: 0.78rem; letter-spacing: 0.5px; }
        .controls-info .ctrl-group { display: flex; flex-direction: column; gap: 2px; align-items: center; }
        .controls-info .ctrl-group strong { font-size: 0.85rem; letter-spacing: 1px; }
        .controls-info kbd {
            display: inline-block;
            background: #2a2a4a; color: #ccc; padding: 1px 7px;
            border-radius: 4px; font-size: 0.72rem; border: 1px solid #3a3a5a;
            font-family: inherit;
        }
        .game-over-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); z-index: 100;
            justify-content: center; align-items: center; flex-direction: column; gap: 16px;
        }
        .game-over-overlay.active { display: flex; }
        .game-over-box {
            background: #16213e; border: 2px solid #3a3a5a; border-radius: 16px;
            padding: 36px 44px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .game-over-box .winner { font-size: 2.2rem; font-weight: 900; margin-bottom: 8px; }
        .game-over-box .subtitle { color: #888; margin-bottom: 22px; font-size: 0.95rem; }
        .btn-restart {
            padding: 10px 30px; font-size: 1rem; font-weight: 700; border: none;
            border-radius: 8px; cursor: pointer; background: linear-gradient(135deg, #e94560, #c23152);
            color: #fff; letter-spacing: 1px; font-family: inherit;
            transition: all 0.2s;
        }
        .btn-restart:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(233,69,96,0.4); }
        .btn-restart:active { transform: translateY(0); }
        @media (max-width: 950px) {
            .controls-info { gap: 15px; flex-wrap: wrap; justify-content: center; }
            .game-title { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-header">
        <span class="game-title">🎮 坦 克 大 战</span>
        <div class="score-panel">
            <div class="player-score">
                <span class="name p1-color">🔵 蓝方 P1</span>
                <span class="score p1-color" id="score1">0</span>
            </div>
            <span class="vs-divider">VS</span>
            <div class="player-score">
                <span class="name p2-color">🔴 红方 P2</span>
                <span class="score p2-color" id="score2">0</span>
            </div>
        </div>
    </div>
    <canvas id="gameCanvas" width="900" height="600"></canvas>
    <div class="controls-info">
        <div class="ctrl-group p1-color">
            <strong>🔵 蓝方 P1</strong>
            <span>移动: <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd></span>
            <span>射击: <kbd>空格</kbd></span>
        </div>
        <div class="ctrl-group p2-color">
            <strong>🔴 红方 P2</strong>
            <span>移动: <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd></span>
            <span>射击: <kbd>Enter</kbd></span>
        </div>
    </div>
</div>
<div class="game-over-overlay" id="gameOverlay">
    <div class="game-over-box">
        <div class="winner" id="winnerText"></div>
        <div class="subtitle" id="winnerSub"></div>
        <button class="btn-restart" id="btnRestart">🔄 再来一局</button>
    </div>
</div>
<script>
(function() {
    // ==================== DOM ====================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const score1El = document.getElementById('score1');
    const score2El = document.getElementById('score2');
    const overlay = document.getElementById('gameOverlay');
    const winnerText = document.getElementById('winnerText');
    const winnerSub = document.getElementById('winnerSub');
    const btnRestart = document.getElementById('btnRestart');

    const W = canvas.width;
    const H = canvas.height;

    // ==================== CONSTANTS ====================
    const TANK_SIZE = 32;
    const TANK_HALF = TANK_SIZE / 2;
    const BULLET_SPEED = 7;
    const BULLET_SIZE = 5;
    const TANK_SPEED = 2.5;
    const TANK_ROTATE_SPEED = 0.04;
    const SHOOT_COOLDOWN = 30;
    const MAX_HEALTH = 100;
    const BULLET_DAMAGE = 25;
    const RESPAWN_INVINCIBLE = 120;
    const RAPID_FIRE_COOLDOWN = 10;
    const WIN_SCORE = 5;

    // ==================== POLYFILL roundRect ====================
    if (!ctx.roundRect) {
        ctx.roundRect = function(x, y, w, h, r) {
            if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
            ctx.beginPath();
            ctx.moveTo(x + r.tl, y);
            ctx.lineTo(x + w - r.tr, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
            ctx.lineTo(x + w, y + h - r.br);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
            ctx.lineTo(x + r.bl, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
            ctx.lineTo(x, y + r.tl);
            ctx.quadraticCurveTo(x, y, x + r.tl, y);
            ctx.closePath();
        };
    }

    // ==================== STATE ====================
    var tanks = [];
    var bullets = [];
    var particles = [];
    var walls = [];
    var powerUps = [];
    var scores = [0, 0];
    var gameOver = false;
    var gameOverTimer = 0;
    var frameCount = 0;
    var animFrameId = null;
    var keys = {};

    // ==================== WALLS ====================
    function generateWalls() {
        var w = [];
        var B = 8;
        // Border
        w.push({ x: 0, y: 0, w: W, h: B, type: 'steel' });
        w.push({ x: 0, y: H - B, w: W, h: B, type: 'steel' });
        w.push({ x: 0, y: 0, w: B, h: H, type: 'steel' });
        w.push({ x: W - B, y: 0, w: B, h: H, type: 'steel' });
        // Inner structures
        w.push({ x: 400, y: 260, w: 100, h: 80, type: 'brick' }); // center
        w.push({ x: 100, y: 80, w: 80, h: 20, type: 'brick' });
        w.push({ x: 100, y: 80, w: 20, h: 80, type: 'brick' });
        w.push({ x: 100, y: 140, w: 60, h: 20, type: 'steel' });
        w.push({ x: 720, y: 80, w: 80, h: 20, type: 'brick' });
        w.push({ x: 780, y: 80, w: 20, h: 80, type: 'brick' });
        w.push({ x: 740, y: 140, w: 60, h: 20, type: 'steel' });
        w.push({ x: 100, y: 500, w: 80, h: 20, type: 'brick' });
        w.push({ x: 100, y: 420, w: 20, h: 100, type: 'brick' });
        w.push({ x: 100, y: 440, w: 60, h: 20, type: 'steel' });
        w.push({ x: 720, y: 500, w: 80, h: 20, type: 'brick' });
        w.push({ x: 780, y: 420, w: 20, h: 100, type: 'brick' });
        w.push({ x: 740, y: 440, w: 60, h: 20, type: 'steel' });
        w.push({ x: 200, y: 200, w: 20, h: 60, type: 'brick' });
        w.push({ x: 200, y: 340, w: 20, h: 60, type: 'brick' });
        w.push({ x: 680, y: 200, w: 20, h: 60, type: 'brick' });
        w.push({ x: 680, y: 340, w: 20, h: 60, type: 'brick' });
        w.push({ x: 340, y: 60, w: 20, h: 60, type: 'steel' });
        w.push({ x: 540, y: 60, w: 20, h: 60, type: 'steel' });
        w.push({ x: 340, y: 480, w: 20, h: 60, type: 'steel' });
        w.push({ x: 540, y: 480, w: 20, h: 60, type: 'steel' });
        w.push({ x: 160, y: 160, w: 40, h: 40, type: 'brick' });
        w.push({ x: 700, y: 160, w: 40, h: 40, type: 'brick' });
        w.push({ x: 160, y: 400, w: 40, h: 40, type: 'brick' });
        w.push({ x: 700, y: 400, w: 40, h: 40, type: 'brick' });
        w.push({ x: 280, y: 150, w: 20, h: 80, type: 'brick' });
        w.push({ x: 300, y: 210, w: 60, h: 20, type: 'brick' });
        w.push({ x: 600, y: 150, w: 20, h: 80, type: 'brick' });
        w.push({ x: 540, y: 210, w: 60, h: 20, type: 'brick' });
        w.push({ x: 280, y: 370, w: 20, h: 80, type: 'brick' });
        w.push({ x: 300, y: 370, w: 60, h: 20, type: 'brick' });
        w.push({ x: 600, y: 370, w: 20, h: 80, type: 'brick' });
        w.push({ x: 540, y: 370, w: 60, h: 20, type: 'brick' });
        return w;
    }

    // ==================== TANK ====================
    function Tank(x, y, angle, color, playerIndex) {
        this.x = x; this.y = y; this.angle = angle;
        this.color = color; this.playerIndex = playerIndex;
        this.health = MAX_HEALTH; this.alive = true;
        this.shootCooldown = 0; this.invincible = RESPAWN_INVINCIBLE;
        this.speed = TANK_SPEED; this.respawnX = x; this.respawnY = y;
        this.respawnAngle = angle; this.trailPositions = [];
        this.rapidFire = false; this.rapidTimer = 0; this.speedBoost = false;
        this.speedTimer = 0;
    }

    Tank.prototype.update = function() {
        if (!this.alive) return;
        if (this.shootCooldown > 0) this.shootCooldown--;
        if (this.invincible > 0) this.invincible--;
        if (this.rapidFire) { this.rapidTimer--; if (this.rapidTimer <= 0) this.rapidFire = false; }
        if (this.speedBoost) { this.speedTimer--; if (this.speedTimer <= 0) { this.speedBoost = false; this.speed = TANK_SPEED; } }

        // Trail
        if (frameCount % 3 === 0) {
            this.trailPositions.push({ x: this.x, y: this.y, alpha: 0.5, size: TANK_HALF * 0.6 });
            if (this.trailPositions.length > 8) this.trailPositions.shift();
        }
        for (var i = this.trailPositions.length - 1; i >= 0; i--) {
            this.trailPositions[i].alpha -= 0.05;
        }

        var newX = this.x, newY = this.y, newAngle = this.angle;

        if (this.playerIndex === 0) {
            if (keys['KeyW']) { newX += Math.cos(this.angle) * this.speed; newY += Math.sin(this.angle) * this.speed; }
            if (keys['KeyS']) { newX -= Math.cos(this.angle) * this.speed; newY -= Math.sin(this.angle) * this.speed; }
            if (keys['KeyA']) newAngle -= TANK_ROTATE_SPEED;
            if (keys['KeyD']) newAngle += TANK_ROTATE_SPEED;
            if (keys['Space'] && this.shootCooldown <= 0) this.shoot();
        } else {
            if (keys['ArrowUp']) { newX += Math.cos(this.angle) * this.speed; newY += Math.sin(this.angle) * this.speed; }
            if (keys['ArrowDown']) { newX -= Math.cos(this.angle) * this.speed; newY -= Math.sin(this.angle) * this.speed; }
            if (keys['ArrowLeft']) newAngle -= TANK_ROTATE_SPEED;
            if (keys['ArrowRight']) newAngle += TANK_ROTATE_SPEED;
            if (keys['Enter'] && this.shootCooldown <= 0) this.shoot();
        }

        while (newAngle < 0) newAngle += Math.PI * 2;
        while (newAngle >= Math.PI * 2) newAngle -= Math.PI * 2;

        if (!collidesWithWalls(newX, newY)) { this.x = newX; this.y = newY; }
        else if (!collidesWithWalls(newX, this.y)) { this.x = newX; }
        else if (!collidesWithWalls(this.x, newY)) { this.y = newY; }

        this.x = clamp(this.x, TANK_HALF + 8, W - TANK_HALF - 8);
        this.y = clamp(this.y, TANK_HALF + 8, H - TANK_HALF - 8);
        this.angle = newAngle;

        // Tank-tank collision
        for (var i = 0; i < tanks.length; i++) {
            var other = tanks[i];
            if (other === this || !other.alive) continue;
            var dx = this.x - other.x, dy = this.y - other.y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < TANK_SIZE && dist > 0) {
                var overlap = (TANK_SIZE - dist) / 2;
                this.x += (dx / dist) * overlap;
                this.y += (dy / dist) * overlap;
                other.x -= (dx / dist) * overlap;
                other.y -= (dy / dist) * overlap;
            }
        }
    };

    function collidesWithWalls(x, y) {
        var hl = TANK_HALF - 1;
        var corners = [[x - hl, y - hl], [x + hl, y - hl], [x - hl, y + hl], [x + hl, y + hl]];
        for (var c = 0; c < 4; c++) {
            var cx = corners[c][0], cy = corners[c][1];
            for (var i = 0; i < walls.length; i++) {
                var w = walls[i];
                if (cx < w.x + w.w && cx > w.x && cy < w.y + w.h && cy > w.y) return true;
            }
        }
        return false;
    }

    Tank.prototype.shoot = function() {
        if (!this.alive) return;
        var bx = this.x + Math.cos(this.angle) * (TANK_HALF + 6);
        var by = this.y + Math.sin(this.angle) * (TANK_HALF + 6);
        bullets.push(new Bullet(bx, by, this.angle, this.playerIndex));
        var cd = this.rapidFire ? RAPID_FIRE_COOLDOWN : SHOOT_COOLDOWN;
        this.shootCooldown = cd;
        for (var i = 0; i < 5; i++) {
            particles.push(new Particle(bx, by, this.angle + (Math.random() - 0.5) * 0.4, this.color, 1.5 + Math.random() * 3, 8 + Math.random() * 8));
        }
    };

    Tank.prototype.takeDamage = function(damage, fromPlayer) {
        if (this.invincible > 0) return;
        this.health -= damage;
        for (var i = 0; i < 12; i++) {
            particles.push(new Particle(this.x, this.y, Math.random() * Math.PI * 2, '#ffffff', 3 + Math.random() * 3, 10 + Math.random() * 10));
        }
        if (this.health <= 0) this.die(fromPlayer);
    };

    Tank.prototype.die = function(killerPlayer) {
        this.alive = false;
        this.health = 0;
        for (var i = 0; i < 30; i++) {
            particles.push(new Particle(this.x, this.y, Math.random() * Math.PI * 2, this.color, 2 + Math.random() * 6, 20 + Math.random() * 30));
        }
        if (killerPlayer !== undefined && killerPlayer !== this.playerIndex) {
            scores[killerPlayer]++;
        } else if (killerPlayer === this.playerIndex) {
            scores[1 - this.playerIndex]++;
        }
        updateScoreUI();
        var self = this;
        setTimeout(function() { if (!gameOver) self.respawn(); }, 2000);
        checkWinCondition();
    };

    Tank.prototype.respawn = function() {
        this.x = this.respawnX; this.y = this.respawnY;
        this.angle = this.respawnAngle; this.health = MAX_HEALTH;
        this.alive = true; this.invincible = RESPAWN_INVINCIBLE;
        this.shootCooldown = 0; this.trailPositions = [];
        this.rapidFire = false; this.speedBoost = false;
        this.speed = TANK_SPEED;
    };

    // ==================== BULLET ====================
    function Bullet(x, y, angle, ownerIndex) {
        this.x = x; this.y = y; this.angle = angle;
        this.vx = Math.cos(angle) * BULLET_SPEED;
        this.vy = Math.sin(angle) * BULLET_SPEED;
        this.ownerIndex = ownerIndex; this.alive = true; this.trail = [];
    }

    Bullet.prototype.update = function() {
        if (!this.alive) return;
        if (frameCount % 2 === 0) {
            this.trail.push({ x: this.x, y: this.y, alpha: 0.7 });
            if (this.trail.length > 6) this.trail.shift();
        }
        for (var i = this.trail.length - 1; i >= 0; i--) {
            this.trail[i].alpha -= 0.1;
        }
        this.x += this.vx;
        this.y += this.vy;

        // Wall collisions
        for (var i = walls.length - 1; i >= 0; i--) {
            var wall = walls[i];
            if (this.x > wall.x && this.x < wall.x + wall.w &&
                this.y > wall.y && this.y < wall.y + wall.h) {
                if (wall.type === 'brick') {
                    createWallExplosion(wall);
                    walls.splice(i, 1);
                } else {
                    createSparkParticles(this.x, this.y);
                }
                this.alive = false;
                return;
            }
        }

        // Out of bounds
        if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) {
            this.alive = false;
            return;
        }

        // Tank hits
        for (var i = 0; i < tanks.length; i++) {
            var tank = tanks[i];
            if (!tank.alive || tank.playerIndex === this.ownerIndex) continue;
            var dx = this.x - tank.x, dy = this.y - tank.y;
            if (Math.sqrt(dx * dx + dy * dy) < TANK_HALF) {
                tank.takeDamage(BULLET_DAMAGE, this.ownerIndex);
                this.alive = false;
                return;
            }
        }
    };

    // ==================== PARTICLE ====================
    function Particle(x, y, angle, color, speed, life) {
        this.x = x; this.y = y;
        var spread = (Math.random() - 0.5) * 1.2;
        var spd = speed || (2 + Math.random() * 4);
        this.vx = Math.cos(angle + spread) * spd;
        this.vy = Math.sin(angle + spread) * spd;
        this.color = color || '#ff6600';
        this.maxLife = life || (15 + Math.random() * 20);
        this.life = this.maxLife;
        this.size = 1.5 + Math.random() * 3;
    }

    Particle.prototype.update = function() {
        this.x += this.vx; this.y += this.vy;
        this.vx *= 0.96; this.vy *= 0.96;
        this.life--;
    };

    Particle.prototype.isAlive = function() { return this.life > 0; };

    // ==================== POWER-UP ====================
    function PowerUp(x, y, type) {
        this.x = x; this.y = y; this.type = type;
        this.size = 14; this.alive = true; this.bobOffset = 0;
    }

    PowerUp.prototype.update = function() {
        this.bobOffset = Math.sin(frameCount * 0.06) * 4;
    };

    PowerUp.prototype.getColor = function() {
        if (this.type === 'health') return '#4caf50';
        if (this.type === 'speed') return '#2196f3';
        return '#ff9800';
    };

    // ==================== HELPERS ====================
    function clamp(v, min, max) { return v < min ? min : v > max ? max : v; }

    function createWallExplosion(wall) {
        var cx = wall.x + wall.w / 2, cy = wall.y + wall.h / 2;
        for (var i = 0; i < 15; i++) {
            particles.push(new Particle(
                cx + (Math.random() - 0.5) * wall.w,
                cy + (Math.random() - 0.5) * wall.h,
                Math.random() * Math.PI * 2, '#b8956a', 1 + Math.random() * 3, 10 + Math.random() * 20
            ));
        }
    }

    function createSparkParticles(x, y) {
        for (var i = 0; i < 8; i++) {
            particles.push(new Particle(x, y, Math.random() * Math.PI * 2, '#ffdd57', 2 + Math.random() * 3, 5 + Math.random() * 10));
        }
    }

    function spawnPowerUp() {
        for (var attempt = 0; attempt < 30; attempt++) {
            var x = 60 + Math.random() * (W - 120), y = 60 + Math.random() * (H - 120);
            var collides = false;
            for (var i = 0; i < walls.length; i++) {
                var w = walls[i];
                if (x + 20 > w.x && x - 20 < w.x + w.w && y + 20 > w.y && y - 20 < w.y + w.h) { collides = true; break; }
            }
            for (var i = 0; i < tanks.length; i++) {
                var t = tanks[i];
                if (!t.alive) continue;
                var dx = x - t.x, dy = y - t.y;
                if (Math.sqrt(dx * dx + dy * dy) < 60) { collides = true; break; }
            }
            if (!collides) {
                var types = ['health', 'speed', 'rapid'];
                powerUps.push(new PowerUp(x, y, types[Math.floor(Math.random() * 3)]));
                return;
            }
        }
    }

    function applyPowerUp(tank, pu) {
        for (var i = 0; i < 10; i++) {
            particles.push(new Particle(tank.x, tank.y, Math.random() * Math.PI * 2, pu.getColor(), 2 + Math.random() * 4, 10 + Math.random() * 15));
        }
        if (pu.type === 'health') {
            tank.health = Math.min(MAX_HEALTH, tank.health + 35);
        } else if (pu.type === 'speed') {
            tank.speed = TANK_SPEED * 1.6;
            tank.speedBoost = true;
            tank.speedTimer = 480;
        } else if (pu.type === 'rapid') {
            tank.rapidFire = true;
            tank.rapidTimer = 480;
        }
    }

    function updateScoreUI() {
        score1El.textContent = scores[0];
        score2El.textContent = scores[1];
        score1El.style.transform = 'scale(1.3)';
        score2El.style.transform = 'scale(1.3)';
        setTimeout(function() { score1El.style.transform = 'scale(1)'; score2El.style.transform = 'scale(1)'; }, 150);
    }

    function checkWinCondition() {
        if (scores[0] >= WIN_SCORE || scores[1] >= WIN_SCORE) {
            gameOver = true; gameOverTimer = 60;
        }
    }

    function showGameOver() {
        overlay.classList.add('active');
        if (scores[0] >= WIN_SCORE) {
            winnerText.innerHTML = '🔵 蓝方获胜!';
            winnerText.style.color = '#4da6ff';
            winnerSub.textContent = '最终比分: ' + scores[0] + ' - ' + scores[1];
        } else {
            winnerText.innerHTML = '🔴 红方获胜!';
            winnerText.style.color = '#ff4d4d';
            winnerSub.textContent = '最终比分: ' + scores[0] + ' - ' + scores[1];
        }
    }

    function resetGame() {
        tanks = [
            new Tank(180, 300, 0, '#4da6ff', 0),
            new Tank(720, 300, Math.PI, '#ff4d4d', 1)
        ];
        bullets = [];
        particles = [];
        powerUps = [];
        walls = generateWalls();
        scores = [0, 0];
        gameOver = false;
        gameOverTimer = 0;
        frameCount = 0;
        updateScoreUI();
        overlay.classList.remove('active');
    }

    // ==================== DRAWING ====================
    function drawBackground() {
        ctx.fillStyle = '#141425';
        ctx.fillRect(0, 0, W, H);

        ctx.strokeStyle = 'rgba(255,255,255,0.015)';
        ctx.lineWidth = 0.5;
        for (var x = 40; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
        for (var y = 40; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

        for (var i = 0; i < walls.length; i++) {
            var wall = walls[i];
            if (wall.type === 'steel') {
                var grad = ctx.createLinearGradient(wall.x, wall.y, wall.x + wall.w, wall.y + wall.h);
                grad.addColorStop(0, '#6b6b7b'); grad.addColorStop(0.3, '#8a8a9a');
                grad.addColorStop(0.5, '#7a7a8a'); grad.addColorStop(0.7, '#5a5a6a');
                grad.addColorStop(1, '#4a4a5a');
                ctx.fillStyle = grad; ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
                ctx.fillStyle = '#3a3a4a';
                for (var rx = wall.x + 6; rx < wall.x + wall.w - 4; rx += 16) {
                    for (var ry = wall.y + 6; ry < wall.y + wall.h - 4; ry += 16) {
                        ctx.beginPath(); ctx.arc(rx, ry, 2.5, 0, Math.PI * 2); ctx.fill();
                    }
                }
                ctx.strokeStyle = '#9a9aaa'; ctx.lineWidth = 1.2;
                ctx.strokeRect(wall.x + 1, wall.y + 1, wall.w - 2, wall.h - 2);
            } else {
                var bg = ctx.createLinearGradient(wall.x, wall.y, wall.x, wall.y + wall.h);
                bg.addColorStop(0, '#c4956a'); bg.addColorStop(1, '#a0754a');
                ctx.fillStyle = bg; ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
                ctx.strokeStyle = '#8b5e3c'; ctx.lineWidth = 0.8;
                var bh = 10, bw = 20;
                for (var by = wall.y; by < wall.y + wall.h; by += bh) {
                    var off = (Math.floor((by - wall.y) / bh) % 2) * (bw / 2);
                    ctx.beginPath(); ctx.moveTo(wall.x, by); ctx.lineTo(wall.x + wall.w, by); ctx.stroke();
                    for (var bx = wall.x + off; bx < wall.x + wall.w; bx += bw) {
                        if (bx > wall.x) { ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx, by + bh); ctx.stroke(); }
                    }
                }
                ctx.strokeStyle = '#6b4a2a'; ctx.lineWidth = 1;
                ctx.strokeRect(wall.x, wall.y, wall.w, wall.h);
            }
        }

        // Spawn zones
        ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
        ctx.setLineDash([6, 8]);
        ctx.beginPath(); ctx.arc(180, 300, 50, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.arc(720, 300, 50, 0, Math.PI * 2); ctx.stroke();
        ctx.setLineDash([]);
    }

    function drawTank(tank) {
        if (!tank.alive) return;
        // Trail
        for (var i = 0; i < tank.trailPositions.length; i++) {
            var t = tank.trailPositions[i];
            if (t.alpha <= 0) continue;
            ctx.save();
            ctx.globalAlpha = t.alpha * 0.3;
            ctx.fillStyle = tank.color;
            ctx.beginPath(); ctx.arc(t.x, t.y, t.size, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        ctx.save();
        ctx.translate(tank.x, tank.y);
        ctx.rotate(tank.angle);

        if (tank.invincible > 0 && Math.floor(tank.invincible / 6) % 2 === 0) {
            ctx.globalAlpha = 0.45;
        }

        var bw = TANK_SIZE, bh = TANK_SIZE * 0.75;
        var tl = TANK_HALF + 4, tw = 7;

        // Treads
        var tg = ctx.createLinearGradient(0, -bh / 2, 0, bh / 2);
        tg.addColorStop(0, '#333'); tg.addColorStop(0.5, '#555'); tg.addColorStop(1, '#333');
        ctx.fillStyle = tg;
        ctx.fillRect(-bw / 2 - 3, -bh / 2, 6, bh);
        ctx.fillRect(bw / 2 - 3, -bh / 2, 6, bh);

        // Tread marks
        ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
        for (var i = Math.floor(-bh / 2) + 6; i < bh / 2; i += 8) {
            ctx.beginPath(); ctx.moveTo(-bw / 2 - 2, i); ctx.lineTo(-bw / 2 + 3, i); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(bw / 2 - 2, i); ctx.lineTo(bw / 2 + 3, i); ctx.stroke();
        }

        // Body
        var bodyG = ctx.createLinearGradient(0, -bh / 2, 0, bh / 2);
        bodyG.addColorStop(0, tankColor(tank.color, 0.25));
        bodyG.addColorStop(0.5, tankColor(tank.color, 0.05));
        bodyG.addColorStop(1, tankColor(tank.color, -0.25));
        ctx.fillStyle = bodyG;
        ctx.beginPath();
        roundedRect(-bw / 2, -bh / 2, bw, bh, 4);
        ctx.fill();
        ctx.strokeStyle = tankColor(tank.color, -0.35); ctx.lineWidth = 2; ctx.stroke();

        // Turret base
        ctx.fillStyle = tankColor(tank.color, -0.15);
        ctx.beginPath(); ctx.arc(0, 0, TANK_HALF * 0.5, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = tankColor(tank.color, -0.35); ctx.lineWidth = 1.5; ctx.stroke();

        // Barrel
        var bg = ctx.createLinearGradient(0, -tw / 2, 0, tw / 2);
        bg.addColorStop(0, tankColor(tank.color, 0.15));
        bg.addColorStop(1, tankColor(tank.color, -0.15));
        ctx.fillStyle = bg;
        ctx.fillRect(2, -tw / 2, tl, tw);
        ctx.strokeStyle = tankColor(tank.color, -0.35); ctx.lineWidth = 1;
        ctx.strokeRect(2, -tw / 2, tl, tw);
        ctx.fillStyle = '#222';
        ctx.fillRect(tl, -tw / 2 + 1, 4, tw - 2);

        // Health bar (un-rotate)
        ctx.rotate(-tank.angle);
        var bx = -TANK_SIZE / 2 - 4, by = -TANK_HALF - 14;
        var bw2 = TANK_SIZE + 8, bh2 = 5;
        ctx.fillStyle = '#333';
        ctx.fillRect(bx, by, bw2, bh2);
        var hp = tank.health / MAX_HEALTH;
        ctx.fillStyle = hp > 0.5 ? 'hsl(' + Math.floor(hp * 120) + ', 80%, 50%)' : '#e94560';
        ctx.fillRect(bx, by, bw2 * hp, bh2);
        ctx.strokeStyle = '#555'; ctx.lineWidth = 0.8;
        ctx.strokeRect(bx, by, bw2, bh2);

        // Player dot
        ctx.fillStyle = tank.playerIndex === 0 ? '#4da6ff' : '#ff4d4d';
        ctx.beginPath(); ctx.arc(0, by - 6, 3.5, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 0.8; ctx.stroke();

        ctx.restore();
    }

    function tankColor(hex, amount) {
        var r, g, b;
        if (hex.length === 7) {
            r = parseInt(hex.substr(1, 2), 16); g = parseInt(hex.substr(3, 2), 16); b = parseInt(hex.substr(5, 2), 16);
        } else {
            r = parseInt(hex.substr(1, 1) + hex.substr(1, 1), 16);
            g = parseInt(hex.substr(2, 1) + hex.substr(2, 1), 16);
            b = parseInt(hex.substr(3, 1) + hex.substr(3, 1), 16);
        }
        r = clamp(Math.round(r + amount * 255), 0, 255);
        g = clamp(Math.round(g + amount * 255), 0, 255);
        b = clamp(Math.round(b + amount * 255), 0, 255);
        return 'rgb(' + r + ',' + g + ',' + b + ')';
    }

    function roundedRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
        ctx.closePath();
    }

    function drawBullet(bullet) {
        if (!bullet.alive) return;
        // Trail
        for (var i = 0; i < bullet.trail.length; i++) {
            var t = bullet.trail[i];
            if (t.alpha <= 0) continue;
            ctx.save();
            ctx.globalAlpha = t.alpha * 0.35;
            ctx.fillStyle = '#ffdd57';
            ctx.beginPath(); ctx.arc(t.x, t.y, BULLET_SIZE * 0.55, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }
        ctx.save(); ctx.translate(bullet.x, bullet.y); ctx.rotate(bullet.angle);
        var glow = ctx.createRadialGradient(0, 0, 0, 0, 0, BULLET_SIZE * 2.5);
        glow.addColorStop(0, 'rgba(255,220,80,0.4)');
        glow.addColorStop(0.5, 'rgba(255,150,30,0.15)');
        glow.addColorStop(1, 'rgba(255,100,0,0)');
        ctx.fillStyle = glow;
        ctx.beginPath(); ctx.arc(0, 0, BULLET_SIZE * 2.5, 0, Math.PI * 2); ctx.fill();
        var bg = ctx.createLinearGradient(-BULLET_SIZE, 0, BULLET_SIZE, 0);
        bg.addColorStop(0, '#ffdd57'); bg.addColorStop(0.5, '#fff'); bg.addColorStop(1, '#ff8c00');
        ctx.fillStyle = bg;
        ctx.beginPath(); ctx.ellipse(0, 0, BULLET_SIZE, BULLET_SIZE * 0.5, 0, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    function drawParticle(p) {
        var alpha = p.life / p.maxLife;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 3;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    function drawPowerUp(pu) {
        if (!pu.alive) return;
        var py = pu.y + pu.bobOffset;
        var glow = ctx.createRadialGradient(pu.x, py, 2, pu.x, py, pu.size + 6);
        var gc = pu.type === 'health' ? 'rgba(76,175,80,0.35)' : pu.type === 'speed' ? 'rgba(33,150,243,0.35)' : 'rgba(255,152,0,0.35)';
        glow.addColorStop(0, gc); glow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glow;
        ctx.beginPath(); ctx.arc(pu.x, py, pu.size + 6, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = pu.getColor();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(pu.x, py, pu.size, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        var txt = pu.type === 'health' ? '+' : pu.type === 'speed' ? 'S' : 'R';
        ctx.fillText(txt, pu.x, py);
    }

    function drawHUD() {
        for (var i = 0; i < tanks.length; i++) {
            var tank = tanks[i];
            var hx = i === 0 ? 20 : W - 180;
            var hy = H - 25;
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.beginPath();
            roundedRect(hx, hy - 5, 160, 22, 6);
            ctx.fill();
            ctx.fillStyle = tank.color;
            ctx.font = 'bold 11px "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(i === 0 ? '蓝方 P1' : '红方 P2', hx + 6, hy + 8);
            var bx = hx + 65, bw3 = 88, bh3 = 7;
            ctx.fillStyle = '#333';
            ctx.fillRect(bx, hy + 2, bw3, bh3);
            var hp = tank.alive ? tank.health / MAX_HEALTH : 0;
            ctx.fillStyle = hp > 0.5 ? 'hsl(' + Math.floor(hp * 120) + ', 70%, 50%)' : '#e94560';
            ctx.fillRect(bx, hy + 2, bw3 * hp, bh3);
            ctx.strokeStyle = '#555'; ctx.lineWidth = 0.5;
            ctx.strokeRect(bx, hy + 2, bw3, bh3);
        }
        ctx.fillStyle = 'rgba(255,255,255,0.45)';
        ctx.font = '11px "Microsoft YaHei", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('先得 ' + WIN_SCORE + ' 分获胜 | First to ' + WIN_SCORE + ' wins', W / 2, H - 8);
    }

    // ==================== INPUT ====================
    window.addEventListener('keydown', function(e) {
        keys[e.code] = true;
        var gameKeys = ['KeyW','KeyA','KeyS','KeyD','Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter'];
        if (gameKeys.indexOf(e.code) >= 0) e.preventDefault();
    });
    window.addEventListener('keyup', function(e) {
        keys[e.code] = false;
        var gameKeys = ['KeyW','KeyA','KeyS','KeyD','Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter'];
        if (gameKeys.indexOf(e.code) >= 0) e.preventDefault();
    });
    btnRestart.addEventListener('click', resetGame);

    // ==================== GAME LOOP ====================
    function gameLoop() {
        frameCount++;

        try {
            ctx.clearRect(0, 0, W, H);
            drawBackground();

            // Power-ups
            for (var i = 0; i < powerUps.length; i++) {
                var pu = powerUps[i];
                if (!pu.alive) continue;
                pu.update();
                drawPowerUp(pu);
                for (var j = 0; j < tanks.length; j++) {
                    var tank = tanks[j];
                    if (!tank.alive) continue;
                    var dx = tank.x - pu.x, dy = tank.y - pu.y;
                    if (Math.sqrt(dx * dx + dy * dy) < TANK_HALF + pu.size) {
                        applyPowerUp(tank, pu);
                        pu.alive = false;
                    }
                }
            }

            // Tanks
            for (var i = 0; i < tanks.length; i++) { tanks[i].update(); }

            // Bullets - use index loop not for-of
            for (var i = 0; i < bullets.length; i++) { bullets[i].update(); }

            // Particles - use index loop
            for (var i = 0; i < particles.length; i++) { particles[i].update(); }

            // Draw
            for (var i = 0; i < tanks.length; i++) { drawTank(tanks[i]); }
            for (var i = 0; i < bullets.length; i++) { drawBullet(bullets[i]); }
            for (var i = 0; i < particles.length; i++) { drawParticle(particles[i]); }

            // Cleanup
            bullets = bullets.filter(function(b) { return b.alive; });
            particles = particles.filter(function(p) { return p.isAlive(); });
            powerUps = powerUps.filter(function(p) { return p.alive; });

            // Spawn power-ups
            if (frameCount % 600 === 0 && powerUps.length < 3 && !gameOver && Math.random() < 0.7) {
                spawnPowerUp();
            }

            drawHUD();

            // Game over
            if (gameOver) {
                gameOverTimer--;
                if (gameOverTimer === 0) showGameOver();
            }
        } catch (err) {
            console.error('Game loop error: ' + err.message + ' at frame ' + frameCount);
            console.error(err.stack);
            // Don't crash - try next frame
        }

        animFrameId = requestAnimationFrame(gameLoop);
    }

    // ==================== INIT ====================
    function init() {
        resetGame();
        animFrameId = requestAnimationFrame(gameLoop);
        setTimeout(function() { if (!gameOver) spawnPowerUp(); }, 3000);
    }

    init();
    console.log('🎮 坦克大战已就绪!');
    console.log('蓝方 P1: WASD 移动, 空格 射击');
    console.log('红方 P2: 方向键 移动, Enter 射击');
    console.log('先得' + WIN_SCORE + '分获胜! 🏆');
})();
</script>
